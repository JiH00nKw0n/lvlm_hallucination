name: cc3m_broadeval

# Rebuttal E4a: broad downstream evaluation of the EXISTING CC3M-trained
# checkpoints (outputs/real_exp_cc3m_s{seed}) on additional datasets:
# Flickr30k retrieval + CIFAR-100 / Food-101 / Oxford-IIIT-Pets zero-shot.
# TRAIN/PERM steps skip via run_real_v2's artifact check; only the new eval
# entries execute. Per-seed: sed the output.root to outputs/real_exp_cc3m_s<seed>.
data:
  dataset: cc3m
  cache_dir: cache/clip_b32_cc3m
  split_train: train
  split_eval: train
  eval_samples: 20000

training:
  lr: 5.0e-4
  num_epochs: 10
  batch_size: 1024
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  k: 32
  latent_size: 8192
  hidden_size: 512
  seed: 0
  dataloader_num_workers: 0
  device: cuda

methods:
  - name: shared
  - name: separated
  - name: iso_align
    aux_weight: 1.0e-4
  - name: group_sparse
    aux_weight: 0.05
  - name: ours
    base_method: separated

evaluations:
  - dataset: coco
    cache_dir: cache/clip_b32_coco
    split: test
    tasks: [recon, retrieval]
  - dataset: flickr30k
    cache_dir: cache/clip_b32_flickr30k
    split: test
    tasks: [retrieval]
  - dataset: imagenet
    cache_dir: cache/clip_b32_imagenet
    split: val
    tasks: [zeroshot_raw]
  - dataset: cifar100
    cache_dir: cache/clip_b32_cifar100
    split: val
    tasks: [zeroshot_raw]
    n_classes: 100
  - dataset: food101
    cache_dir: cache/clip_b32_food101
    split: val
    tasks: [zeroshot_raw]
    n_classes: 101
  - dataset: pets
    cache_dir: cache/clip_b32_pets
    split: val
    tasks: [zeroshot_raw]
    n_classes: 37

output:
  root: outputs/real_exp_cc3m
