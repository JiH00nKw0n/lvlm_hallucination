name: cc3m_clip_b32_batchtopk

# CLIP B/32 CC3M with BatchTopK reconstruction (vs default per-sample TopK).
# Same matched-capacity setup as cc3m.yaml; all 5 methods swap TopKSAE → BatchTopKSAE.
data:
  dataset: cc3m
  cache_dir: cache/clip_b32_cc3m
  split_train: train
  split_eval: train
  eval_samples: 20000

training:
  lr: 5.0e-4
  num_epochs: 10
  batch_size: 1024
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  k: 32
  latent_size: 8192
  hidden_size: 512
  seed: 0
  dataloader_num_workers: 0
  device: cuda

methods:
  - {name: shared,       sae_class: batch_topk}
  - {name: separated,    sae_class: batch_topk}
  - {name: iso_align,    sae_class: batch_topk, aux_weight: 1.0e-4}
  - {name: group_sparse, sae_class: batch_topk, aux_weight: 0.05}
  - {name: ours,         sae_class: batch_topk, base_method: separated}

evaluations:
  - dataset: coco
    cache_dir: cache/clip_b32_coco
    split: test
    tasks: [recon, retrieval]
  - dataset: imagenet
    cache_dir: cache/clip_b32_imagenet
    split: val
    tasks: [recon, zeroshot_raw]

output:
  root: outputs/real_exp_cc3m_clip_b32_batchtopk
