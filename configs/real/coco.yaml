name: coco

data:
  dataset: coco
  cache_dir: cache/clip_b32_coco
  split_train: train
  split_eval: test
  eval_samples: 0

training:
  lr: 5.0e-4
  num_epochs: 30
  batch_size: 1024
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  k: 32
  latent_size: 8192
  hidden_size: 512
  seed: 0
  dataloader_num_workers: 2
  device: cuda

methods:
  - name: shared
  - name: separated
  - name: iso_align
    aux_weight: 1.0e-4
  - name: group_sparse
    aux_weight: 0.05
  - name: ours
    base_method: separated

evaluations:
  - dataset: coco
    cache_dir: cache/clip_b32_coco
    split: test
    tasks: [recon, retrieval]
  - dataset: imagenet
    cache_dir: cache/clip_b32_imagenet
    split: val
    tasks: [recon, zeroshot_raw]

output:
  root: outputs/real_exp_coco
