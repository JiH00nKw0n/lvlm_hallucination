name: cc3m_aimv2

# Rebuttal E3: AIMv2 backbone (apple/aimv2-large-patch14-224-lit, LiT-tuned,
# projection_dim=768). Same CC3M protocol as cc3m.yaml, only the encoder
# swapped. Caches extracted via extract_web_pairs_cache.py (train) and the
# --model flag on the COCO/ImageNet extractors (eval).
data:
  dataset: cc3m
  cache_dir: cache/aimv2_lit_cc3m
  split_train: train
  split_eval: train
  eval_samples: 20000

training:
  lr: 5.0e-4
  num_epochs: 10
  batch_size: 1024
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  warmup_ratio: 0.05
  k: 32
  latent_size: 8192
  hidden_size: 768
  seed: 0
  dataloader_num_workers: 0
  device: cuda

methods:
  - name: shared
  - name: separated
  - name: iso_align
    aux_weight: 1.0e-4
  - name: group_sparse
    aux_weight: 0.05
  - name: ours
    base_method: separated

evaluations:
  - dataset: coco
    cache_dir: cache/aimv2_lit_coco
    split: test
    tasks: [recon, retrieval]
  - dataset: imagenet
    cache_dir: cache/aimv2_lit_imagenet
    split: val
    tasks: [recon, zeroshot_raw]

output:
  root: outputs/real_exp_cc3m_aimv2
