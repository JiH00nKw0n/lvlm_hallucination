data:
  n_shared: 1024
  n_image: 512
  n_text: 512
  representation_dim: 256
  sparsity: 0.99
  beta: 1.0
  obs_noise_std: 0.05
  max_interference: 0.1
  num_train: 50000
  num_eval: 10000

training:
  lr: 0.0005
  num_epochs: 10
  batch_size: 256
  k: 16
  weight_decay: 0.0
  max_grad_norm: 0.0
  device: cuda
  weight_tie: true

methods:
  - name: single_recon
  - name: two_recon

sweep:
  alpha: [1.0]
  latent_size: [8192]
  num_seeds: 2
  seed_base: 4

output:
  root: outputs/theorem2_v2_1R2R_5seeds_coarse_wtie_resume
  save_decoders: true
