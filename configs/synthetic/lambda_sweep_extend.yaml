data:
  n_shared: 1024
  n_image: 512
  n_text: 512
  representation_dim: 256
  sparsity: 0.99
  beta: 1.0
  obs_noise_std: 0.05
  max_interference: 0.3
  num_train: 50000
  num_eval: 10000

training:
  lr: 0.0005
  num_epochs: 10
  batch_size: 256
  k: 16
  weight_decay: 0.0
  max_grad_norm: 0.0
  device: cuda

methods:
  # Extend the original [1/16, 1/4, 1, 4, 16] sweep with 1/64 and 64 to
  # bracket the predicted phase transitions of Propositions 3 and 4.
  - name: iso_align
    aux_weight: 0.000469    # 0.03 x 1/64
  - name: iso_align
    aux_weight: 1.92        # 0.03 x 64
  - name: group_sparse
    aux_weight: 0.000781    # 0.05 x 1/64
  - name: group_sparse
    aux_weight: 3.2         # 0.05 x 64

sweep:
  alpha: [0.5]
  latent_size: [8192]
  num_seeds: 5
  seed_base: 1

output:
  root: outputs/theorem2_v2_lambda_sweep_extend
  save_decoders: true
