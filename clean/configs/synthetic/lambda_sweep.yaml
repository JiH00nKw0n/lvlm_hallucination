# Fig 2 — λ sweep at α=0.5, IA × 5 + GS × 5 + 1R + 2R + Post-hoc, 5 seeds.

kind: synthetic_sweep

data:
  n_shared: 1024
  n_image: 512
  n_text: 512
  representation_dim: 256
  sparsity: 0.99
  beta: 1.0
  obs_noise_std: 0.05
  max_interference: 0.30
  num_train: 50_000
  num_eval: 10_000

training:
  lr: 5.0e-4
  num_epochs: 10
  batch_size: 256
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  k: 16
  latent_size: 8192
  warmup_ratio: 0.05
  device: cuda

methods:
  - {name: shared}
  - {name: separated}
  - {name: iso_align,    aux_weight: 1.0e-6}
  - {name: iso_align,    aux_weight: 1.0e-5}
  - {name: iso_align,    aux_weight: 1.0e-4}
  - {name: iso_align,    aux_weight: 1.0e-3}
  - {name: iso_align,    aux_weight: 1.0e-2}
  - {name: group_sparse, aux_weight: 0.0125}
  - {name: group_sparse, aux_weight: 0.025}
  - {name: group_sparse, aux_weight: 0.05}
  - {name: group_sparse, aux_weight: 0.1}
  - {name: group_sparse, aux_weight: 0.2}

sweep:
  alpha: [0.5]
  latent_size: [8192]
  num_seeds: 5
  seed_base: 1

output:
  root: clean/outputs/theorem2_lambda_sweep
  save_decoders: true
