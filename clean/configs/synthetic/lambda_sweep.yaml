# Fig 2 — λ sweep at α=0.5, IA × 5 + GS × 5 + 1R + 2R + Post-hoc, 3 seeds.
# CLIP-style: unit-L2-norm image/text embeddings.

kind: synthetic_sweep

data:
  n_shared: 1024
  n_image: 512
  n_text: 512
  representation_dim: 256
  sparsity: 0.99
  beta: 1.0
  obs_noise_std: 0.05
  max_interference: 0.30
  num_train: 50_000
  num_eval: 10_000
  l2_normalize: true

training:
  lr: 5.0e-4
  num_epochs: 10
  batch_size: 256
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  k: 16
  latent_size: 8192
  warmup_ratio: 0.05
  device: cuda

methods:
  - {name: shared}
  - {name: separated}
  # iso_align: center λ_IA = 0.03 × {1/64, 1/4, 1, 4, 64}
  - {name: iso_align,    aux_weight: 4.6875e-4}
  - {name: iso_align,    aux_weight: 7.5e-3}
  - {name: iso_align,    aux_weight: 3.0e-2}
  - {name: iso_align,    aux_weight: 1.2e-1}
  - {name: iso_align,    aux_weight: 1.92}
  # group_sparse: center λ_GS = 0.05 × {1/64, 1/4, 1, 4, 64}
  - {name: group_sparse, aux_weight: 7.8125e-4}
  - {name: group_sparse, aux_weight: 1.25e-2}
  - {name: group_sparse, aux_weight: 5.0e-2}
  - {name: group_sparse, aux_weight: 2.0e-1}
  - {name: group_sparse, aux_weight: 3.2}

sweep:
  alpha: [0.5]
  latent_size: [8192]
  num_seeds: 3
  seed_base: 1

output:
  root: clean/outputs/theorem2_lambda_sweep_l2
  save_decoders: true
