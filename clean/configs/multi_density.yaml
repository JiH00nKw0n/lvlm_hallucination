# 8-VLM density figure (paper §3.3, Fig multi_density).
# Per-model cache_dir is templated from `cache.cache_dir` with {key} substitution.

kind: multi_density

models:
  - !ref models/clip_b32.yaml
  - !ref models/metaclip_b32.yaml
  - !ref models/openclip_b32.yaml
  - !ref models/siglip2_base.yaml
  - !ref models/clip_l14.yaml
  - !ref models/metaclip_l14.yaml
  - !ref models/openclip_l14.yaml
  - !ref models/siglip2_large.yaml

cache:
  cache_dir: cache/{key}_coco       # {key} expanded per-model
  dataset: coco
  split: train

training:
  lr: 5.0e-4
  num_epochs: 30
  batch_size: 1024
  weight_decay: 1.0e-5
  max_grad_norm: 1.0
  k: 8
  latent_size: 8192
  warmup_ratio: 0.05
  device: cuda
  seed: 0

output:
  root: clean/outputs/multi_density
